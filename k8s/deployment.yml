apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vidya
  template:
    metadata:
      labels:
        app: vidya
    spec:
      containers:
      - name: mail-cont
        image: arunasri0096/mail:latest
        ports:
        - containerPort: 80
